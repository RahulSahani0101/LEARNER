services:
  mysql:
    image: mysql:8.4
    container_name: javadevmastery-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-javadevmastery}
      MYSQL_USER: ${MYSQL_USER:-javadev}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-javadevpass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: javadevmastery-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-javadevmastery}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-javadev}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-javadevpass}
      APP_JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-ReplaceWithALongAccessSecretForJwtSigning1234567890}
      APP_JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-ReplaceWithALongRefreshSecretForJwtSigning1234567890}
      APP_JWT_ACCESS_EXPIRATION_MINUTES: ${JWT_ACCESS_EXPIRATION_MINUTES:-30}
      APP_JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS:-7}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: javadevmastery-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8080}/api
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  mysql_data:
