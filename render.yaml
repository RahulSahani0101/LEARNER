services:
  - type: web
    name: javadevmastery-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: dev
      - key: APP_JWT_ACCESS_SECRET
        generateValue: true
      - key: APP_JWT_REFRESH_SECRET
        generateValue: true
      - key: APP_JWT_ACCESS_EXPIRATION_MINUTES
        value: "30"
      - key: APP_JWT_REFRESH_EXPIRATION_DAYS
        value: "7"
      - key: APP_CORS_ALLOWED_ORIGIN_PATTERNS
        value: https://javadevmastery-frontend.onrender.com,http://localhost:5173

  - type: web
    name: javadevmastery-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://javadevmastery-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
