spring.application.name=javadevmastery-backend
server.port=${PORT:8080}

spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]
spring.profiles.default=dev

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.access-secret=${APP_JWT_ACCESS_SECRET:PleaseReplaceWithARealAccessSecretKey}
app.jwt.refresh-secret=${APP_JWT_REFRESH_SECRET:PleaseReplaceWithARealRefreshSecretKey}
app.jwt.access-expiration-minutes=${APP_JWT_ACCESS_EXPIRATION_MINUTES:30}
app.jwt.refresh-expiration-days=${APP_JWT_REFRESH_EXPIRATION_DAYS:7}

springdoc.api-docs.path=/api/docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info

app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost}
